# 在 49.233.211.168（www.luca0527.com / www.luca0527.art）的 Nginx 中加入以下 location
# 将 /talk-to-god 转发到 81.70.46.23

location = /talk-to-god {
    return 301 /talk-to-god/;
}

location /talk-to-god/ {
    proxy_pass http://81.70.46.23/talk-to-god/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
}
